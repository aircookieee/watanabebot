version: '3.8'

services:
  watanabebot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./resources:/app/resources
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_PLAYLIST_ID=${SPOTIFY_PLAYLIST_ID}
      - WORDNIK_API_KEY=${WORDNIK_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHANNEL_MUSICART_WEBHOOK_ID=${CHANNEL_MUSICART_WEBHOOK_ID}
      - CHANNEL_LOVELIVE_MUSIC_ID=${CHANNEL_LOVELIVE_MUSIC_ID}
      - CHANNEL_DAILY_FACTS_ID=${CHANNEL_DAILY_FACTS_ID}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: watanabebot-network
